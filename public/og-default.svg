<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Vantage Printers  Heavy-industrial printing &amp; packaging engineered for production">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b18"/>
      <stop offset="1" stop-color="#0a1322"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b08833" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d4af5a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#b08833" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#foil)"/>

  <g transform="translate(80, 78)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="20" font-weight="600" letter-spacing="6" fill="#b08833">/  PRESS  HOUSE</text>
  </g>

  <g transform="translate(80, 230)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="104" font-weight="700" letter-spacing="-3" fill="#faf8f3">Vantage</text>
    <text x="0" y="110" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="48" font-weight="500" letter-spacing="-0.5" fill="#cfd5e0">Heavy-industrial print, engineered.</text>
  </g>

  <g transform="translate(80, 502)" font-family="DM Sans, system-ui, sans-serif"
     font-size="20" font-weight="500" letter-spacing="3" fill="#8b96ad">
    <text x="0" y="0">LAHORE  Ṗ  EST. 1992  Ṗ  40+ INTERNATIONAL BRANDS</text>
  </g>

  <g transform="translate(0, 614)">
    <rect x="0" y="0" width="300" height="16" fill="#00aeef"/>
    <rect x="300" y="0" width="300" height="16" fill="#ec008c"/>
    <rect x="600" y="0" width="300" height="16" fill="#ffd400"/>
    <rect x="900" y="0" width="300" height="16" fill="#0a1322"/>
  </g>
</svg>
